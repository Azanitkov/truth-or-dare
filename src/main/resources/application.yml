spring:
  application:
    name: truth-or-dare

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trueordare}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${PORT:8080}

app:
  admin:
    code: ${ADMIN_CODE:12175v}
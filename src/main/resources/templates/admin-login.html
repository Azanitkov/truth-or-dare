<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход в админку | Правда или действие</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(145deg, #4a0e2e, #8a2c5a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .login-card {
      background: rgba(124, 31, 93, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 180, 200, 0.5);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .btn-primary {
      background: linear-gradient(95deg, #d45c7a, #b23a5c);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(95deg, #e47c9a, #c45a7c);
    }
  </style>
</head>
<body>
<div class="login-card">
  <h3 class="text-center mb-4">🔐 ОЙ, тебе сюда нельзя это Доступ в админ-панель</h3>
  <form method="post" th:action="@{/admin-area/login}">
    <input type="password" name="code" class="form-control mb-3" placeholder="Введите код доступа" required autofocus>
    <button type="submit" class="btn btn-primary w-100">Войти</button>
  </form>
  <div th:if="${param.error}" class="alert alert-danger mt-3 text-center">
    ❌ Неверный код
  </div>
  <div class="text-center mt-3">
    <a href="/" class="text-white-50">← На главную</a>
  </div>
</div>
</body>
</html>
